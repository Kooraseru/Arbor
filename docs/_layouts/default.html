<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">Arbor</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/examples/' | relative_url }}">Examples</a>
        <a href="{{ '/type-functions/' | relative_url }}">Type Functions</a>
        <a href="{{ '/runtime-loaders/' | relative_url }}">Runtime Loaders</a>
        <a href="https://github.com/Kooraseru/Arbor">GitHub</a>
      </nav>
    </header>

    <div class="shell">
      <aside class="sidebar" aria-label="Documentation navigation">
        <a href="{{ '/' | relative_url }}">Overview</a>
        <a href="{{ '/install/' | relative_url }}">Install</a>
        <a href="{{ '/analyzer-model/' | relative_url }}">Analyzer Model</a>
        <a href="{{ '/type-functions/' | relative_url }}">Type Functions</a>
        <a href="{{ '/examples/' | relative_url }}">Examples</a>
        <a href="{{ '/runtime-loaders/' | relative_url }}">Runtime Loaders</a>
        <a href="{{ '/package-boundaries/' | relative_url }}">Package Boundaries</a>
        <a href="{{ '/export-and-ci/' | relative_url }}">Export And CI</a>
        <a href="{{ '/faq/' | relative_url }}">FAQ</a>
      </aside>

      <main class="content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
