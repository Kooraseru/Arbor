site_name: Arbor
site_description: Analyzer-friendly static tree helpers for Luau and Roblox packages.
site_url: https://kooraseru.github.io/Arbor/
repo_url: https://github.com/Kooraseru/Arbor
repo_name: Kooraseru/Arbor
copyright: Copyright &copy; 2026 Kooraseru. Documentation licensed under <a href="https://github.com/Kooraseru/Arbor/blob/main/LICENSE">Apache-2.0</a>. Made with <a href="https://squidfunk.github.io/mkdocs-material/">Material for MkDocs</a>.

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - Install: install.md
  - Analyzer Model: analyzer-model.md
  - Type Functions: type-functions.md
  - Examples: examples.md
  - Runtime Loaders: runtime-loaders.md
  - Package Boundaries: package-boundaries.md
  - Export And CI: export-and-ci.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  generator: false
