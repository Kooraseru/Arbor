site_name: Arbor
site_description: Analyzer-friendly static tree helpers for Luau and Roblox packages.
site_url: https://kooraseru.github.io/Arbor/
repo_url: https://github.com/Kooraseru/Arbor
repo_name: Kooraseru/Arbor
copyright: Copyright &copy; 2026 Kooraseru. Documentation licensed under <a href="https://github.com/Kooraseru/Arbor/blob/main/LICENSE">Apache-2.0</a>. Made with <a href="https://squidfunk.github.io/mkdocs-material/">Material for MkDocs</a>.

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  icon:
    repo: fontawesome/brands/github

nav:
  - Introduction:
      - Overview: index.md
      - Why Arbor?: introduction/why-arbor.md
      - Installation: install.md
      - Quick Start: introduction/quick-start.md
  - Core Concepts:
      - Analyzer Model: analyzer-model.md
      - Package Boundaries: package-boundaries.md
      - Runtime Loading: runtime-loaders.md
      - Design Goals: core-concepts/design-goals.md
  - API Reference:
      - InstanceTree:
          - Overview: api/instance-tree/index.md
          - ChildNames: api/instance-tree/child-names.md
          - ChildOf: api/instance-tree/child-of.md
          - ChildRecord: api/instance-tree/child-record.md
          - ChildrenOfClass: api/instance-tree/children-of-class.md
          - ChildNamesOfClass: api/instance-tree/child-names-of-class.md
      - RuntimeLoaders:
          - Overview: api/runtime-loaders/index.md
          - LoadModuleMap: api/runtime-loaders/load-module-map.md
  - Guides:
      - Creating a Package: guides/creating-a-package.md
      - Exporting Packages: guides/exporting-packages.md
      - CI Integration: export-and-ci.md
      - Typechecking: guides/typechecking.md
      - Best Practices: guides/best-practices.md
  - Examples:
      - Overview: examples.md
      - Direct Children: examples/direct-children.md
      - Class Filtering: examples/class-filtering.md
      - Runtime Validation: examples/runtime-validation.md
      - Package Extraction: examples/package-extraction.md
  - Reference:
      - FAQ: faq.md
      - Roadmap: reference/roadmap.md
      - Changelog: reference/changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  generator: false
