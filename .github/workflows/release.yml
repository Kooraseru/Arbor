name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary

permissions:
  contents: write

jobs:
  release:
    name: Release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create package release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          case "$RELEASE_BRANCH" in
            main)
              channel="Stable"
              ;;
            canary)
              channel="Pre-release"
              ;;
            *)
              echo "Unsupported release branch: $RELEASE_BRANCH" >&2
              exit 1
              ;;
          esac

          python .github/scripts/construct-changelog.py

          python .github/scripts/resolve-release-note.py --channel "$channel" --github-output "$GITHUB_OUTPUT"
          tag="$(grep '^tag=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
          notes_source="$(grep '^notes_source=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
          prerelease="$(grep '^prerelease=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
          target_sha="$(git rev-parse HEAD)"

          if [ ! -f "$notes_source" ]; then
            echo "Missing release notes: $notes_source" >&2
            exit 1
          fi

          if [ "$prerelease" = "true" ]; then
            prerelease_flag="--prerelease"
          else
            prerelease_flag=""
          fi

          bash .github/scripts/export-rbxm.sh
          mkdir -p .tmp/results/release/assets
          cp .tmp/results/export/rbxm-export/result/Arbor.rbxm .tmp/results/release/assets/Arbor.rbxm

          bash .github/scripts/write-release-notes.sh .tmp/results/release/notes.md "$notes_source" "$target_sha" .tmp/results/release/assets/Arbor.rbxm

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Deleting existing release $tag before replacement."
            gh release delete "$tag" --yes
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Deleting existing tag $tag before replacement."
            git push origin --delete "$tag"
          fi

          for attempt in 1 2 3 4 5; do
            if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              break
            fi

            if [ "$attempt" = "5" ]; then
              echo "Tag $tag still exists after deletion; repository rules or release immutability may be blocking replacement." >&2
              exit 1
            fi

            echo "Waiting for tag $tag deletion to propagate..."
            sleep 2
          done

          gh release create "$tag" \
            --target "$target_sha" \
            --title "Arbor ${tag}" \
            --notes-file .tmp/results/release/notes.md \
            $prerelease_flag \
            .tmp/results/release/assets/Arbor.rbxm
