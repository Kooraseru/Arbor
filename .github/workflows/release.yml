name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Release commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create commit release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          short_sha="${COMMIT_SHA::7}"
          tag="commit-${short_sha}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          bash .github/scripts/export-rbxm.sh
          bash .github/scripts/write-release-notes.sh .tmp/release/notes.md "$COMMIT_SHA" .tmp/rbxm-export/result/Arbor.rbxm

          git tag "$tag" "$COMMIT_SHA"
          git push origin "$tag"

          gh release create "$tag" \
            --target "$COMMIT_SHA" \
            --title "Arbor ${tag}" \
            --notes-file .tmp/release/notes.md \
            .tmp/rbxm-export/result/Arbor.rbxm
