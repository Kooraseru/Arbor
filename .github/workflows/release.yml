name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      commit_sha: ${{ steps.pin.outputs.commit_sha }}
      notes_source: ${{ steps.release.outputs.notes_source }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      tag_exists: ${{ steps.tag.outputs.exists }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name == 'canary' && 'canary' || 'main' }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "channel=Stable" >> "$GITHUB_OUTPUT"
              ;;
            canary)
              echo "channel=Pre-release" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Release workflow only supports main and canary, got ${GITHUB_REF_NAME}." >&2
              exit 1
              ;;
          esac

      - name: Resolve release note
        id: release
        shell: bash
        run: |
          python .github/scripts/resolve-release-note.py --channel "${{ steps.channel.outputs.channel }}" --github-output "$GITHUB_OUTPUT"
          version="$(grep '^tag=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"
          notes_source="$(grep '^notes_source=' "$GITHUB_OUTPUT" | tail -n 1 | cut -d= -f2-)"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Malformed resolved release version: $version" >&2
            echo "Expected a semantic-version tag like v1.0.1 or v1.0.1-canary.1." >&2
            exit 1
          fi

          if [ ! -f "$notes_source" ]; then
            echo "Missing release notes source: $notes_source" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Pin validated commit
        id: pin
        shell: bash
        run: |
          commit_sha="$(git rev-parse HEAD)"
          if ! git cat-file -e "${commit_sha}^{commit}"; then
            echo "Validated commit is not available locally: $commit_sha" >&2
            exit 1
          fi

          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Validated main commit: $commit_sha"

      - name: Check tag state
        id: tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          tag_exists=false
          if git rev-list -n 1 "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            tag_exists=true
            echo "Local tag already exists and will be replaced after approval: $RELEASE_VERSION"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            tag_exists=true
            echo "Remote tag already exists and will be replaced after approval: $RELEASE_VERSION"
          fi

          echo "exists=$tag_exists" >> "$GITHUB_OUTPUT"

      - name: Construct changelog
        shell: bash
        run: |
          python .github/scripts/construct-changelog.py
          test -f CHANGELOG.md

      - name: Check package shape
        shell: bash
        run: |
          test -f README.md
          test -f RULES.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f src/init.luau
          test -d src/InstanceTree
          test -d src/RuntimeLoaders

      - name: Check examples shape
        shell: bash
        run: |
          test -f content/en/examples/README.md
          test -f content/en/examples/direct-children/README.md
          test -f content/en/examples/direct-children/init.luau
          test -f content/en/examples/class-filtered-children/README.md
          test -f content/en/examples/class-filtered-children/init.luau
          test -f content/en/examples/runtime-loader/README.md
          test -f content/en/examples/runtime-loader/init.luau
          test -f content/en/examples/extracted-package/README.md

      - name: Reject game-rooted requires
        shell: bash
        run: |
          if grep -R --line-number --include='*.luau' --include='*.lua' -E '@game|@Shared|@Client|@Server' src; then
            echo "Found game-rooted require alias in package source." >&2
            exit 1
          fi

      - name: Reject high-risk casts
        shell: bash
        run: |
          if grep -R --line-number --include='*.luau' --include='*.lua' -E '::[[:space:]]*any|require\(.+\)[[:space:]]*::[[:space:]]*any' src; then
            echo "Found high-risk any cast." >&2
            exit 1
          fi

      - name: Validate release scripts
        shell: bash
        run: |
          bash -n .github/scripts/export-rbxm.sh
          bash -n .github/scripts/test-pages-workflow.sh
          bash -n .github/scripts/write-release-notes.sh
          python -m py_compile .github/scripts/construct-changelog.py .github/scripts/resolve-release-note.py .github/scripts/configure-mkdocs-language.py

  create-tag:
    name: Publish approved release
    runs-on: ubuntu-latest
    needs: validate
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.commit_sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify pinned commit
        shell: bash
        env:
          VALIDATED_COMMIT: ${{ needs.validate.outputs.commit_sha }}
        run: |
          if ! git cat-file -e "${VALIDATED_COMMIT}^{commit}"; then
            echo "Validated commit is no longer available: $VALIDATED_COMMIT" >&2
            exit 1
          fi

          checked_out="$(git rev-parse HEAD)"
          if [ "$checked_out" != "$VALIDATED_COMMIT" ]; then
            echo "Checked out $checked_out instead of validated commit $VALIDATED_COMMIT." >&2
            exit 1
          fi

      - name: Build release package
        shell: bash
        env:
          NOTES_SOURCE: ${{ needs.validate.outputs.notes_source }}
          VALIDATED_COMMIT: ${{ needs.validate.outputs.commit_sha }}
        run: |
          python .github/scripts/construct-changelog.py
          bash .github/scripts/export-rbxm.sh src .tmp/results/release/assets/Arbor.rbxm Arbor
          bash .github/scripts/write-release-notes.sh .tmp/results/release/notes.md "$NOTES_SOURCE" "$VALIDATED_COMMIT" .tmp/results/release/assets/Arbor.rbxm

      - name: Push release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          VALIDATED_COMMIT: ${{ needs.validate.outputs.commit_sha }}
          TAG_EXISTS: ${{ needs.validate.outputs.tag_exists }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN:-}" ]; then
            echo "Missing RELEASE_TOKEN environment secret. Check the release environment configuration." >&2
            exit 1
          fi

          if git rev-list -n 1 "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Deleting existing local tag before replacement: $RELEASE_VERSION"
            git tag -d "$RELEASE_VERSION"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Deleting existing remote tag before replacement: $RELEASE_VERSION"
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            if ! git push origin --delete "$RELEASE_VERSION"; then
              echo "Failed to delete existing remote tag $RELEASE_VERSION. The token may lack access, authentication may have failed, or the repository ruleset may have rejected the admin bypass." >&2
              exit 1
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "$RELEASE_VERSION" "$VALIDATED_COMMIT"

          if ! git push origin "refs/tags/$RELEASE_VERSION:refs/tags/$RELEASE_VERSION"; then
            echo "Failed to push $RELEASE_VERSION. The token may lack access, authentication may have failed, or the repository ruleset may have rejected the admin bypass." >&2
            exit 1
          fi

          echo "Created release tag $RELEASE_VERSION at $VALIDATED_COMMIT."

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          VALIDATED_COMMIT: ${{ needs.validate.outputs.commit_sha }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing RELEASE_TOKEN environment secret. Check the release environment configuration." >&2
            exit 1
          fi

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Deleting existing GitHub Release before replacement: $RELEASE_VERSION"
            if ! gh release delete "$RELEASE_VERSION" --yes; then
              echo "Failed to delete existing GitHub Release $RELEASE_VERSION. The token may lack Contents write access, authentication may have failed, or release immutability may still be enabled." >&2
              exit 1
            fi
          fi

          release_flags=()
          if [ "$PRERELEASE" = "true" ]; then
            release_flags+=(--prerelease)
          fi

          if ! gh release create "$RELEASE_VERSION" \
            --target "$VALIDATED_COMMIT" \
            --title "Arbor ${RELEASE_VERSION}" \
            --notes-file .tmp/results/release/notes.md \
            "${release_flags[@]}" \
            .tmp/results/release/assets/Arbor.rbxm; then
            echo "Failed to publish GitHub Release $RELEASE_VERSION. The token may lack Contents write access, authentication may have failed, or repository release rules may have rejected the request." >&2
            exit 1
          fi

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arbor-${{ needs.validate.outputs.version }}
          path: |
            .tmp/results/release/assets/Arbor.rbxm
            .tmp/results/release/notes.md
          if-no-files-found: error
