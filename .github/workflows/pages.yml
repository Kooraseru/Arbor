name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary
    paths:
      - "assets/**"
      - "content/**"
      - "release-notes/**"
      - ".github/mkdocs.yml"
      - ".github/wiki-languages.yml"
      - ".github/scripts/construct-changelog.py"
      - ".github/scripts/configure-mkdocs-language.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  examples:
    name: Examples shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check content examples
        shell: bash
        run: |
          test -f content/en/examples/README.md
          test -f content/en/examples/direct-children/README.md
          test -f content/en/examples/direct-children/init.luau
          test -f content/en/examples/class-filtered-children/README.md
          test -f content/en/examples/class-filtered-children/init.luau
          test -f content/en/examples/runtime-loader/README.md
          test -f content/en/examples/runtime-loader/init.luau
          test -f content/en/examples/extracted-package/README.md

      - name: Reject forbidden example casts and aliases
        shell: bash
        run: |
          if grep -R --line-number --include='*.luau' --include='*.lua' -E '@game|@Shared|@Client|@Server|::[[:space:]]*any|require\(.+\)[[:space:]]*::[[:space:]]*any' content/en/examples; then
            echo "Found forbidden alias or high-risk any cast in content/en/examples."
            exit 1
          fi

      - name: Check example file shape
        shell: bash
        run: |
          if grep -R --line-number --include='*.luau' --include='*.lua' -- '--# Examples' content/en/examples; then
            echo "Examples should use normal file-shape headers, not --# Examples."
            exit 1
          fi

          missing_return=0
          while IFS= read -r file; do
            if ! grep -q -- '--# Return' "$file"; then
              echo "Missing --# Return in $file"
              missing_return=1
            fi
          done < <(find content/en/examples -type f \( -name '*.luau' -o -name '*.lua' \))

          exit "$missing_return"

  build:
    name: Build MkDocs sites
    needs: examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material pyyaml

      - name: Build main docs
        if: hashFiles('main/.github/mkdocs.yml') != ''
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/_site"
          cd main
          python .github/scripts/construct-changelog.py
          rm -rf content/en/wiki/assets content/jp/wiki/assets
          cp -R assets content/en/wiki/assets
          cp -R assets content/jp/wiki/assets

          cp .github/mkdocs.yml .github/.tmp-mkdocs-en.yml
          python .github/scripts/configure-mkdocs-language.py --config .github/.tmp-mkdocs-en.yml --language en --alternate-site-url https://kooraseru.github.io/Arbor/
          mkdocs build --config-file .github/.tmp-mkdocs-en.yml --site-dir "$GITHUB_WORKSPACE/_site"

          cp .github/mkdocs.yml .github/.tmp-mkdocs-jp.yml
          python .github/scripts/configure-mkdocs-language.py --config .github/.tmp-mkdocs-jp.yml --language jp --alternate-site-url https://kooraseru.github.io/Arbor/
          mkdocs build --config-file .github/.tmp-mkdocs-jp.yml --site-dir "$GITHUB_WORKSPACE/_site/jp"

      - name: Checkout canary branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: canary
          path: canary

      - name: Configure canary docs
        if: hashFiles('canary/.github/mkdocs.yml') != ''
        shell: bash
        run: |
          cd canary
          python .github/scripts/construct-changelog.py
          rm -rf content/en/wiki/assets content/jp/wiki/assets
          cp -R assets content/en/wiki/assets
          cp -R assets content/jp/wiki/assets

          cp .github/mkdocs.yml .github/.tmp-mkdocs-en.yml
          python .github/scripts/configure-mkdocs-language.py --config .github/.tmp-mkdocs-en.yml --language en --site-name "Arbor Canary" --site-url https://kooraseru.github.io/Arbor/canary/ --alternate-site-url https://kooraseru.github.io/Arbor/canary/
          cp .github/mkdocs.yml .github/.tmp-mkdocs-jp.yml
          python .github/scripts/configure-mkdocs-language.py --config .github/.tmp-mkdocs-jp.yml --language jp --site-name "Arbor Canary" --site-url https://kooraseru.github.io/Arbor/canary/jp/ --alternate-site-url https://kooraseru.github.io/Arbor/canary/

      - name: Build canary docs preview
        if: hashFiles('canary/.github/mkdocs.yml') != ''
        shell: bash
        run: |
          cd canary
          mkdocs build --config-file .github/.tmp-mkdocs-en.yml --site-dir "$GITHUB_WORKSPACE/_site/canary"
          mkdocs build --config-file .github/.tmp-mkdocs-jp.yml --site-dir "$GITHUB_WORKSPACE/_site/canary/jp"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
