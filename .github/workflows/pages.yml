name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary
      - ci
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs sites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material

      - name: Build main docs
        if: hashFiles('main/mkdocs.yml') != ''
        shell: bash
        run: |
          mkdir -p _site
          mkdocs build --config-file main/mkdocs.yml --site-dir _site

      - name: Checkout canary branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: canary
          path: canary

      - name: Configure canary docs base URL
        if: hashFiles('canary/mkdocs.yml') != ''
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("canary/mkdocs.yml")
          text = config.read_text(encoding="utf-8")
          text = text.replace("site_url: https://kooraseru.github.io/Arbor/", "site_url: https://kooraseru.github.io/Arbor/canary/")
          config.write_text(text, encoding="utf-8")
          PY

      - name: Build canary docs preview
        if: hashFiles('canary/mkdocs.yml') != ''
        shell: bash
        run: |
          mkdocs build --config-file canary/mkdocs.yml --site-dir _site/canary

      - name: Checkout ci branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: ci
          path: ci

      - name: Configure ci docs base URL
        if: hashFiles('ci/mkdocs.yml') != ''
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("ci/mkdocs.yml")
          text = config.read_text(encoding="utf-8")
          text = text.replace("site_url: https://kooraseru.github.io/Arbor/", "site_url: https://kooraseru.github.io/Arbor/ci/")
          config.write_text(text, encoding="utf-8")
          PY

      - name: Build ci docs preview
        if: hashFiles('ci/mkdocs.yml') != ''
        shell: bash
        run: |
          mkdocs build --config-file ci/mkdocs.yml --site-dir _site/ci

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
