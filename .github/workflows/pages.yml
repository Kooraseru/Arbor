name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary
      - ci
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll sites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build main docs
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./main/docs
          destination: ./_site
        env:
          JEKYLL_ENV: production

      - name: Checkout canary branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: canary
          path: canary

      - name: Configure canary docs base URL
        if: hashFiles('canary/docs/_config.yml') != ''
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("canary/docs/_config.yml")
          text = config.read_text(encoding="utf-8")
          text = text.replace('baseurl: "/Arbor"', 'baseurl: "/Arbor/canary"')
          config.write_text(text, encoding="utf-8")
          PY

      - name: Build canary docs preview
        if: hashFiles('canary/docs/_config.yml') != ''
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./canary/docs
          destination: ./_site/canary
        env:
          JEKYLL_ENV: production

      - name: Checkout ci branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: ci
          path: ci

      - name: Configure ci docs base URL
        if: hashFiles('ci/docs/_config.yml') != ''
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("ci/docs/_config.yml")
          text = config.read_text(encoding="utf-8")
          text = text.replace('baseurl: "/Arbor"', 'baseurl: "/Arbor/ci"')
          config.write_text(text, encoding="utf-8")
          PY

      - name: Build ci docs preview
        if: hashFiles('ci/docs/_config.yml') != ''
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./ci/docs
          destination: ./_site/ci
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
