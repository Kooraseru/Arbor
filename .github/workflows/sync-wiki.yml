name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "wiki/**"

permissions:
  contents: write

jobs:
  sync:
    name: Sync wiki pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Checkout wiki
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-remote

      - name: Copy wiki pages
        shell: bash
        run: |
          find wiki-remote -maxdepth 1 -type f -name '*.md' -delete
          find wiki -maxdepth 1 -type f -name '*.md' ! -name 'README.md' -exec cp {} wiki-remote/ \;

      - name: Publish wiki changes
        shell: bash
        working-directory: wiki-remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git commit -m "Sync wiki pages"
          git push
